services:
  - type: web
    name: big-dogs-fx-backend
    runtime: node
    repo: https://github.com/TysonCoding-Sudo/The-Big-Dogs-FX
    branch: master
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: MT5_ENCRYPT_KEY
        sync: false
      - key: EA_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://tysoncoding-sudo.github.io,https://big-dogs-fx-backend.onrender.com
